apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: athena
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      nodeSelector:
        workload: ai
      enableServiceLinks: false
      initContainers:
        - name: copy-config
          image: busybox:latest
          command: ["sh", "-c", "cp /config-src/settings.yml /etc/searxng/settings.yml"]
          volumeMounts:
            - name: config-src
              mountPath: /config-src
            - name: config-dir
              mountPath: /etc/searxng
      containers:
        - name: searxng
          image: searxng/searxng:latest
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config-dir
              mountPath: /etc/searxng
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config-src
          configMap:
            name: searxng-config
        - name: config-dir
          emptyDir: {}
