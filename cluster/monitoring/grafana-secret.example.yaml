# EXAMPLE ONLY — do not commit a real password. Create the live secret out-of-band
# in the MONITORING namespace (the namespace gotcha from key-lessons applies here
# too — a secret in `default` is invisible to the grafana pod):
#
#   kubectl create secret generic grafana-secret -n monitoring \
#     --from-literal=admin-password='<a-strong-password>'
#
# The grafana Deployment reads admin-password into GF_SECURITY_ADMIN_PASSWORD.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: monitoring
type: Opaque
stringData:
  admin-password: "CHANGE_ME"
