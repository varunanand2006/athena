# Example k8s secret for the agent's Google Calendar access
# (Phase 20 read-only; widened to read+write in Phase 23).
#
# DO NOT commit a populated copy of this file. The real version lives at
# cluster/agent/gcal-secret.yaml, which is matched by `*-secret.yaml` in
# .gitignore. This `.example.yaml` filename intentionally doesn't match the
# ignore pattern so the template stays in source control.
#
# These three values come from a one-time local OAuth flow. On your laptop
# (NOT in-cluster), with the OAuth client_secret.json downloaded from the GCP
# console (the same Desktop app client used for Gmail works fine), run:
#   python scripts/calendar_oauth.py /path/to/client_secret.json
# It opens a browser, you consent (Calendar read + create/update access), and it
# prints the client id, client secret, and refresh token to paste below.
#
# SCOPE: calendar.events (Phase 23) — read + create/update events. The token
# also technically permits deletion, but the agent never deletes (enforced in
# code: no delete tool, no events().delete() call). This is WIDER than the
# Phase 20 calendar.readonly scope, so you must re-run scripts/calendar_oauth.py
# to mint a NEW refresh token and replace the value below — the old read-only
# token cannot create or update events. The Phase 21 background calendar feed
# (read-only by behavior) shares this same token by design.
#
# Apply the populated secret (note: -n athena is mandatory):
#   cp gcal-secret.example.yaml gcal-secret.yaml
#   # paste the three values into stringData below, then:
#   kubectl apply -n athena -f cluster/agent/gcal-secret.yaml
#   kubectl rollout restart -n athena deployment/agent

apiVersion: v1
kind: Secret
metadata:
  name: gcal-secret
  namespace: athena
type: Opaque
stringData:
  GCAL_CLIENT_ID: ""
  GCAL_CLIENT_SECRET: ""
  GCAL_REFRESH_TOKEN: ""
