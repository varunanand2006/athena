# Example k8s secret for the agent's read-only Google Calendar lookup (Phase 20).
#
# DO NOT commit a populated copy of this file. The real version lives at
# cluster/agent/gcal-secret.yaml, which is matched by `*-secret.yaml` in
# .gitignore. This `.example.yaml` filename intentionally doesn't match the
# ignore pattern so the template stays in source control.
#
# These three values come from a one-time local OAuth flow. On your laptop
# (NOT in-cluster), with the OAuth client_secret.json downloaded from the GCP
# console (the same Desktop app client used for Gmail works fine), run:
#   python scripts/calendar_oauth.py /path/to/client_secret.json
# It opens a browser, you consent (read-only Calendar access), and it prints the
# client id, client secret, and the long-lived refresh token to paste below.
#
# SCOPE: the minted token is scoped to calendar.readonly ONLY — it physically
# cannot create, edit, or delete events.
#
# Apply the populated secret (note: -n athena is mandatory):
#   cp gcal-secret.example.yaml gcal-secret.yaml
#   # paste the three values into stringData below, then:
#   kubectl apply -n athena -f cluster/agent/gcal-secret.yaml
#   kubectl rollout restart -n athena deployment/agent

apiVersion: v1
kind: Secret
metadata:
  name: gcal-secret
  namespace: athena
type: Opaque
stringData:
  GCAL_CLIENT_ID: ""
  GCAL_CLIENT_SECRET: ""
  GCAL_REFRESH_TOKEN: ""
