apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: athena
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
      annotations:
        # Phase 22: annotation-based pod service discovery (no ServiceMonitor CRD).
        # Prometheus role:pod SD scrapes the app port directly at /metrics.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        workload: ai
      enableServiceLinks: false
      volumes:
        # Memory vault (Phase 14). local-path PVC binds to xdev-sr,
        # the node this deployment is pinned to via workload: ai.
        - name: memory
          persistentVolumeClaim:
            claimName: agent-memory
      containers:
        - name: agent
          image: athena-agent:phase23
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: memory
              mountPath: /data/memory
          env:
            # Phase 22: labels every athena_* metric + JSON log line for this service.
            - name: SERVICE_NAME
              value: "agent"
            # Backend toggle — Gemma (gemma4:e2b on CPU) was retired for latency.
            # "openai" routes the background chat mode + reflection sweeps to
            # gpt-4o-mini and RAG embeddings to text-embedding-3-small. Flip both
            # back to "ollama" (and run the ingestion /reembed) to restore Gemma.
            - name: LLM_BACKEND
              value: "openai"
            - name: EMBED_BACKEND
              value: "openai"
            - name: OPENAI_CHAT_MODEL
              value: "gpt-4o-mini"
            - name: OPENAI_EMBED_MODEL
              value: "text-embedding-3-small"
            # Kept for the LLM_BACKEND=ollama revert path (unused while openai).
            - name: OLLAMA_BASE_URL
              value: "http://ollama.athena.svc.cluster.local:11434"
            - name: SEARXNG_BASE_URL
              value: "http://searxng.athena.svc.cluster.local:80"
            - name: QDRANT_URL
              value: "http://qdrant.athena.svc.cluster.local:6333"
            - name: INGESTION_URL
              value: "http://ingestion.athena.svc.cluster.local"
            - name: EMBED_MODEL
              value: "nomic-embed-text"
            - name: OLLAMA_MODEL
              value: "gemma4:e2b"
            # Phase 21: the background email sweep ONLY ingests emails carrying
            # this Gmail label (the full inbox is never swept). Change the label
            # here without a rebuild; defaults to "athena" in code if unset.
            - name: ATHENA_EMAIL_LABEL
              value: "athena"
            # Phase 23: fallback timezone for calendar event creation/updates.
            # The agent reads the primary calendar's own timezone at runtime and
            # only falls back to this if that lookup fails. Set to the user's
            # IANA timezone. Change without a rebuild.
            - name: CALENDAR_TIMEZONE
              value: "America/New_York"
            - name: POSTGRES_HOST
              value: "postgres.athena.svc.cluster.local"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: OPENAI_API_KEY
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            # Google Calendar (Phase 20 read; Phase 23 create/update). The
            # gcal-secret token was widened to calendar.events — read + write,
            # but the agent never deletes (enforced in code). Same secret keys as
            # before, so no manifest change beyond this comment; re-mint the token
            # with scripts/calendar_oauth.py. See gcal-secret.example.yaml. Marked
            # optional so the agent still starts before the secret is applied.
            - name: GCAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: gcal-secret
                  key: GCAL_CLIENT_ID
                  optional: true
            - name: GCAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gcal-secret
                  key: GCAL_CLIENT_SECRET
                  optional: true
            - name: GCAL_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gcal-secret
                  key: GCAL_REFRESH_TOKEN
                  optional: true
            # Read-only Gmail lookup (Phase 19). gmail.readonly scope only —
            # the credential cannot send/delete/modify mail. See
            # cluster/agent/gmail-secret.example.yaml. Marked optional so the
            # agent still starts before the secret is applied; search_email
            # then returns "not configured" until the secret exists.
            - name: GMAIL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: gmail-secret
                  key: GMAIL_CLIENT_ID
                  optional: true
            - name: GMAIL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gmail-secret
                  key: GMAIL_CLIENT_SECRET
                  optional: true
            - name: GMAIL_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gmail-secret
                  key: GMAIL_REFRESH_TOKEN
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
