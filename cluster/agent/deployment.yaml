apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: athena
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      nodeSelector:
        workload: ai
      enableServiceLinks: false
      volumes:
        # Memory vault (Phase 14). local-path PVC binds to xdev-sr,
        # the node this deployment is pinned to via workload: ai.
        - name: memory
          persistentVolumeClaim:
            claimName: agent-memory
      containers:
        - name: agent
          image: athena-agent:streaming
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: memory
              mountPath: /data/memory
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama.athena.svc.cluster.local:11434"
            - name: SEARXNG_BASE_URL
              value: "http://searxng.athena.svc.cluster.local:80"
            - name: QDRANT_URL
              value: "http://qdrant.athena.svc.cluster.local:6333"
            - name: INGESTION_URL
              value: "http://ingestion.athena.svc.cluster.local"
            - name: EMBED_MODEL
              value: "nomic-embed-text"
            - name: OLLAMA_MODEL
              value: "gemma4:e2b"
            - name: POSTGRES_HOST
              value: "postgres.athena.svc.cluster.local"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: OPENAI_API_KEY
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            # Read-only Google Calendar lookup (Phase 20). calendar.readonly scope
            # only — the credential cannot create/edit/delete events. See
            # cluster/agent/gcal-secret.example.yaml. Marked optional so the
            # agent still starts before the secret is applied.
            - name: GCAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: gcal-secret
                  key: GCAL_CLIENT_ID
                  optional: true
            - name: GCAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gcal-secret
                  key: GCAL_CLIENT_SECRET
                  optional: true
            - name: GCAL_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gcal-secret
                  key: GCAL_REFRESH_TOKEN
                  optional: true
            # Read-only Gmail lookup (Phase 19). gmail.readonly scope only —
            # the credential cannot send/delete/modify mail. See
            # cluster/agent/gmail-secret.example.yaml. Marked optional so the
            # agent still starts before the secret is applied; search_email
            # then returns "not configured" until the secret exists.
            - name: GMAIL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: gmail-secret
                  key: GMAIL_CLIENT_ID
                  optional: true
            - name: GMAIL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gmail-secret
                  key: GMAIL_CLIENT_SECRET
                  optional: true
            - name: GMAIL_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gmail-secret
                  key: GMAIL_REFRESH_TOKEN
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
