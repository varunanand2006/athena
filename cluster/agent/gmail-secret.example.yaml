# Example k8s secret for the agent's read-only Gmail lookup (Phase 19).
#
# DO NOT commit a populated copy of this file. The real version lives at
# cluster/agent/gmail-secret.yaml, which is matched by `*-secret.yaml` in
# .gitignore. This `.example.yaml` filename intentionally doesn't match the
# ignore pattern so the template stays in source control.
#
# These three values come from a one-time local OAuth flow. On your laptop
# (NOT in-cluster), with the OAuth client_secret.json downloaded from the GCP
# console, run:
#   python scripts/gmail_oauth.py /path/to/client_secret.json
# It opens a browser, you consent (read-only Gmail access), and it prints the
# client id, client secret, and the long-lived refresh token to paste below.
# See docs/phases/phase-19-gmail-readonly.md for the full GCP setup steps.
#
# SCOPE: the minted token is scoped to gmail.readonly ONLY — it physically
# cannot send, draft, delete, modify, or label mail.
#
# Apply the populated secret (note: -n athena is mandatory — a secret in the
# default namespace is invisible to pods in athena and the env vars would
# silently come up empty, so search_email would report "not configured" with
# no obvious cause):
#   cp gmail-secret.example.yaml gmail-secret.yaml
#   # paste the three values into stringData below, then:
#   kubectl apply -n athena -f cluster/agent/gmail-secret.yaml
#   kubectl rollout restart -n athena deployment/agent
#
# Rotation: re-run scripts/gmail_oauth.py to mint a fresh refresh token (or
# revoke the old one at https://myaccount.google.com/permissions), update the
# secret, kubectl apply, rollout restart.

apiVersion: v1
kind: Secret
metadata:
  name: gmail-secret
  namespace: athena
type: Opaque
stringData:
  GMAIL_CLIENT_ID: "<REPLACE_WITH_CLIENT_ID>"
  GMAIL_CLIENT_SECRET: "<REPLACE_WITH_CLIENT_SECRET>"
  GMAIL_REFRESH_TOKEN: "<REPLACE_WITH_REFRESH_TOKEN>"
