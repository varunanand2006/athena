apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: athena
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
      annotations:
        # Phase 22: annotation-based pod service discovery — scrape app port /metrics.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        kubernetes.io/hostname: vlinux2
      enableServiceLinks: false
      volumes:
        - name: documents
          persistentVolumeClaim:
            claimName: ingestion-documents
      containers:
        - name: ingestion
          image: athena-ingestion:phase22
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: documents
              mountPath: /data/documents
          env:
            # Phase 22: labels every athena_* metric + JSON log line for this service.
            - name: SERVICE_NAME
              value: "ingestion"
            # Backend toggle — Gemma was retired for latency. "openai" routes
            # summaries to gpt-4o-mini and embeddings to text-embedding-3-small
            # (1536-dim). Switching EMBED_BACKEND changes the vector dimension, so
            # after deploy run: kubectl exec/curl POST /reembed once to rebuild the
            # Qdrant collection from cached summaries. Flip back to "ollama" +
            # /reembed to restore nomic-embed-text (768-dim).
            - name: LLM_BACKEND
              value: "openai"
            - name: EMBED_BACKEND
              value: "openai"
            - name: OPENAI_CHAT_MODEL
              value: "gpt-4o-mini"
            - name: OPENAI_EMBED_MODEL
              value: "text-embedding-3-small"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: OPENAI_API_KEY
            # Kept for the EMBED_BACKEND/LLM_BACKEND=ollama revert path.
            - name: OLLAMA_BASE_URL
              value: "http://ollama.athena.svc.cluster.local:11434"
            - name: QDRANT_URL
              value: "http://qdrant.athena.svc.cluster.local:6333"
            - name: EMBED_MODEL
              value: "nomic-embed-text"
            - name: OLLAMA_MODEL
              value: "gemma4:e2b"
            - name: INGESTION_DOCS_DIR
              value: "/data/documents"
            - name: POSTGRES_HOST
              value: "postgres.athena.svc.cluster.local"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
