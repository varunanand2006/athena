apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: athena
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      nodeSelector:
        kubernetes.io/hostname: vlinux2
      enableServiceLinks: false
      volumes:
        - name: documents
          persistentVolumeClaim:
            claimName: ingestion-documents
      containers:
        - name: ingestion
          image: athena-ingestion:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: documents
              mountPath: /data/documents
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama.athena.svc.cluster.local:11434"
            - name: QDRANT_URL
              value: "http://qdrant.athena.svc.cluster.local:6333"
            - name: EMBED_MODEL
              value: "nomic-embed-text"
            - name: OLLAMA_MODEL
              value: "gemma4:e2b"
            - name: INGESTION_DOCS_DIR
              value: "/data/documents"
            - name: POSTGRES_HOST
              value: "postgres.athena.svc.cluster.local"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
