# Example k8s secret for the cloudflared connector token (Phase 13).
#
# DO NOT commit a populated copy of this file. The real version lives at
# cluster/cloudflared/tunnel-secret.yaml, which is matched by `*-secret.yaml`
# in .gitignore. This `.example.yaml` filename intentionally doesn't match
# the ignore pattern so the template stays in source control.
#
# The token is created in the Cloudflare dashboard:
#   Networks → Connectors → Create a connector → type Cloudflared → name it
#   athena-mcp → copy the long `eyJ...` token shown on the install screen.
#   Don't run any install commands on a host — we run cloudflared in-cluster.
#
# Recommended apply path (matches what we did for mcp-auth — avoids ever
# leaving the raw token on disk in a YAML file that could leak):
#
#   TOKEN='<paste the eyJ... token here>'
#   kubectl create secret generic cloudflared -n athena \
#     --from-literal=token="$TOKEN" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Rotation:
#   - Dashboard → Networks → Connectors → athena-mcp → regenerate token
#   - Re-run the kubectl create … | apply -f - command with the new token
#   - kubectl rollout restart -n athena deployment/cloudflared

apiVersion: v1
kind: Secret
metadata:
  name: cloudflared
  namespace: athena
type: Opaque
stringData:
  token: "<REPLACE_WITH_CONNECTOR_TOKEN>"
