apiVersion: apps/v1
kind: Deployment
metadata:
  name: internship-hunter
  namespace: athena
spec:
  # Scaled to 0 — not in use. Turned off after the OpenAI migration so the daily
  # listing pull + per-posting LLM scoring (now paid gpt-4o-mini) don't run while
  # unused. Manifest kept; set replicas back to 1 and re-apply to resume.
  replicas: 0
  selector:
    matchLabels:
      app: internship-hunter
  template:
    metadata:
      labels:
        app: internship-hunter
      annotations:
        # Phase 22: role:pod SD scrapes the daemon-thread metrics listener.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        kubernetes.io/hostname: vlinux2
      enableServiceLinks: false
      containers:
        - name: internship-hunter
          image: athena-internship:phase22
          imagePullPolicy: Never
          ports:
            - containerPort: 9100
              name: metrics
          env:
            # Phase 22: metric/log service label + the port start_metrics_server binds.
            - name: SERVICE_NAME
              value: "internship"
            - name: METRICS_PORT
              value: "9100"
            # Backend toggle — Gemma retired for latency. "openai" routes company
            # research + posting scoring to gpt-4o-mini; flip to "ollama" to
            # restore gemma4:e2b.
            - name: LLM_BACKEND
              value: "openai"
            - name: OPENAI_CHAT_MODEL
              value: "gpt-4o-mini"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: OPENAI_API_KEY
            # Kept for the LLM_BACKEND=ollama revert path.
            - name: OLLAMA_URL
              value: "http://ollama.athena.svc.cluster.local:11434"
            - name: OLLAMA_MODEL
              value: "gemma4:e2b"
            - name: SEARXNG_URL
              value: "http://searxng.athena.svc.cluster.local"
            - name: POSTGRES_HOST
              value: "postgres.athena.svc.cluster.local"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
