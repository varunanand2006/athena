apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: athena
spec:
  # Scaled to 0: Gemma (gemma4:e2b) was too slow on CPU for the workload, so all
  # LLM + embedding traffic moved to OpenAI (LLM_BACKEND/EMBED_BACKEND=openai on
  # the agent/ingestion/leetcode/internship deployments). This manifest, the PVC,
  # and the pulled models are KEPT so reverting is just: set replicas back to 1,
  # flip those env vars to "ollama", and re-run the ingestion POST /reembed.
  replicas: 0
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector:
        workload: ai
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 8000m
              memory: 14Gi
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-pvc
