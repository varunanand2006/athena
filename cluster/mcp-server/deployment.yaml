apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: athena
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      # Co-locate with the agent it proxies. Every MCP tool call becomes
      # an in-cluster HTTP call to the agent; keeping them on the same
      # node avoids cross-node hops on the hot path. The agent itself is
      # pinned to xdev-sr via workload=ai, so we match that label.
      nodeSelector:
        workload: ai
      enableServiceLinks: false
      containers:
        - name: mcp-server
          image: athena-mcp-server:phase13
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AGENT_BASE_URL
              value: "http://agent.athena.svc.cluster.local"
            - name: BIND_ADDRESS
              value: "0.0.0.0:8080"
            # rmcp's DNS-rebinding guard rejects any Host: not on this list.
            # The Cloudflare Tunnel public hostname is appended in Phase 13
            # Step 2 once the tunnel is provisioned.
            - name: ALLOWED_HOSTS
              value: "mcp.local,mcp.local:80,localhost,127.0.0.1,0.0.0.0"
            # Phase 13: bearer token for the auth middleware. Sourced from a
            # k8s Secret (not committed). Unset → middleware fails closed and
            # rejects every /mcp request.
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-auth
                  key: token
            - name: RUST_LOG
              value: "info,athena_mcp_server=debug"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
