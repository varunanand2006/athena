# Example k8s secret for the MCP server's bearer-token auth (Phase 13).
#
# DO NOT commit a populated copy of this file. The real version lives at
# cluster/mcp-server/mcp-auth-secret.yaml, which is matched by `*-secret.yaml`
# in .gitignore. This `.example.yaml` filename intentionally doesn't match the
# ignore pattern so the template stays in source control.
#
# Generate a token (laptop or any machine with openssl):
#   openssl rand -hex 32
#
# Apply the populated secret (note: -n athena is mandatory — a secret in the
# default namespace is invisible to pods in athena and the env var would
# silently come up empty, which the middleware then fail-closes on, so you'd
# see uniform 401s with no obvious cause):
#   cp mcp-auth-secret.example.yaml mcp-auth-secret.yaml
#   # paste the generated token into stringData.token, then:
#   kubectl apply -n athena -f cluster/mcp-server/mcp-auth-secret.yaml
#   kubectl rollout restart -n athena deployment/mcp-server
#
# Rotation: regenerate, kubectl apply, rollout restart, then update the
# client-side header (claude mcp remove athena-remote -s user && re-add with
# --header "Authorization: Bearer <new>").

apiVersion: v1
kind: Secret
metadata:
  name: mcp-auth
  namespace: athena
type: Opaque
stringData:
  token: "<REPLACE_WITH_TOKEN>"
