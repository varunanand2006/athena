server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    # Proxy agent endpoints
    location ~ ^/(chat|conversations|internships|leetcode|healthz|documents|system) {
        proxy_pass http://agent.athena.svc.cluster.local:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Proxy ingestion endpoints (uploads + TOC)
    location ~ ^/(ingest|toc) {
        proxy_pass http://ingestion.athena.svc.cluster.local:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
        proxy_request_buffering off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
