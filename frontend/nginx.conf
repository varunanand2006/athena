server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the agent to avoid CORS
    location ~ ^/(chat|internships|leetcode) {
        proxy_pass http://agent.athena.svc.cluster.local:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
